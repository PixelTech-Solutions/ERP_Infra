name: "Configure ERP (Ansible)"

# Runs the Ansible playbooks against already-provisioned servers.
# Trigger manually after the Terraform Apply succeeds, using the IPs
# printed in the Terraform outputs.

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target cloud (sets the SSH user)"
        type: choice
        options: [azure, aws]
        default: azure
      app_host:
        description: "App server PUBLIC IP (from Terraform output app_public_ip)"
        required: true
      db_host:
        description: "DB server PUBLIC IP (from Terraform output db_public_ip)"
        required: true
      db_private_ip:
        description: "DB server PRIVATE IP (from Terraform output db_private_ip)"
        required: true

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout ERP application source
        uses: actions/checkout@v4
        with:
          repository: PixelTech-Solutions/ERP_System
          ref: main
          token: ${{ secrets.GH_PAT || github.token }}
          path: erp-src

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend JAR
        working-directory: erp-src/backend
        run: mvn -q clean package -DskipTests

      - name: Stage JAR for Ansible
        run: |
          mkdir -p ansible/files
          cp erp-src/backend/target/erp-system-1.0.0.jar ansible/files/

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass
          ansible-galaxy collection install community.mysql

      - name: Generate inventory
        working-directory: ansible
        run: |
          ssh_user=azureuser
          if [ "${{ inputs.cloud }}" = "aws" ]; then ssh_user=ubuntu; fi
          mkdir -p inventory
          cat > inventory/hosts.ini <<EOF
          [app]
          app-server ansible_host=${{ inputs.app_host }}

          [db]
          db-server ansible_host=${{ inputs.db_host }}

          [all:vars]
          ansible_user=${ssh_user}
          ansible_ssh_common_args=-o StrictHostKeyChecking=no
          db_private_ip=${{ inputs.db_private_ip }}
          mysql_database=erp
          mysql_app_user=erp_app
          EOF

      - name: Wait for SSH to be reachable
        run: |
          for i in $(seq 1 30); do
            if nc -z -w 5 ${{ inputs.app_host }} 22 && nc -z -w 5 ${{ inputs.db_host }} 22; then
              echo "SSH reachable on both hosts"; exit 0
            fi
            echo "waiting for SSH... ($i)"; sleep 10
          done
          echo "Timed out waiting for SSH"; exit 1

      - name: Configure database server
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook playbooks/db.yml \
            --extra-vars "ansible_password=${{ secrets.TF_VAR_ADMIN_PASSWORD }} \
                          ansible_become_pass=${{ secrets.TF_VAR_ADMIN_PASSWORD }} \
                          mysql_root_password=${{ secrets.MYSQL_ROOT_PASSWORD }} \
                          mysql_app_password=${{ secrets.MYSQL_APP_PASSWORD }}"

      - name: Configure application server
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook playbooks/app.yml \
            --extra-vars "ansible_password=${{ secrets.TF_VAR_ADMIN_PASSWORD }} \
                          ansible_become_pass=${{ secrets.TF_VAR_ADMIN_PASSWORD }} \
                          db_password=${{ secrets.MYSQL_APP_PASSWORD }}"
